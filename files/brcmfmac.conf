# /etc/modprobe.d/brcmfmac.conf
#
# Fixes for BCM43602 on MacBook Pro 12,1 (2015)
#
# roamoff=1              - Disable firmware-based roaming (prevents interference)
# feature_disable=0x2000 - Disable BRCMF_FEAT_FWSUP (bit 13)
#                          The 2015 firmware has a buggy internal WPA supplicant
#                          that fails the 4-way handshake silently. Disabling it
#                          forces the host (wpa_supplicant/NM) to do the handshake.
options brcmfmac roamoff=1 feature_disable=0x2000
